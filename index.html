<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拼豆图纸搜索助手</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<div class="box">
  <h1>拼豆图纸搜索助手</h1>

  <textarea id="jpInput" placeholder="请输入日语，例如：ナルト、ちいかわ、初音ミク"></textarea>

  <button id="searchBtn">搜索小红书图纸</button>

  <div id="result" class="result"></div>

  <div class="note">
    ※ 本页面不会保存或搬运小红书图纸图片，只会生成搜索关键词和跳转链接。
  </div>
</div>

<script src="./app.js"></script>
</body>
</html>
